<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Email Boost</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* LOGIN CARD */
.container {
    background: #1e293b;
    padding: 40px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    text-align: center;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1 {
    margin-bottom: 10px;
}

.subtitle {
    color: #94a3b8;
    margin-bottom: 20px;
}

/* ERROR BOX */
.error-box {
    background: rgba(220, 38, 38, 0.1);
    border: 1px solid #dc2626;
    color: #f87171;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 15px;
    font-size: 14px;
}

/* INPUTS */
.input-group {
    text-align: left;
    margin-bottom: 20px;
}

.input-group label {
    font-size: 14px;
    color: #cbd5f5;
}

.input-group input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #0f172a;
    color: white;
    outline: none;
    transition: all 0.2s ease;
}

.input-group input:hover {
    border-color: #475569;
}

.input-group input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 2px rgba(99,102,241,0.3);
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #6366f1;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
}

button:hover {
    background: #4f46e5;
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 10px 25px rgba(99,102,241,0.5);
}

/* FOOTER */
.footer {
    margin-top: 20px;
    font-size: 14px;
    color: #94a3b8;
}

.footer a {
    color: #6366f1;
    text-decoration: none;
    transition: color 0.2s;
}

.footer a:hover {
    color: #a5b4fc;
}
</style>

</head>
<body>

<div class="container">
    <h1>Email Boost</h1>
    <p class="subtitle">Login to continue</p>

    <!-- 🔴 ERROR MESSAGE -->
    {% if wrong %}
        <div class="error-box">
            Password Wrong
        </div>
    {% endif %}

    <form action="/homelogin" method="POST">
        <div class="input-group">
            <label>Username</label>
            <input  name="username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
